<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片拼图打印工具</title>
<style>
  :root {
    --bg: #e8e8e8;
    --card: #ffffff;
    --text: #1a1a1a;
    --text-muted: #666;
    --accent: #4a90d9;
    --accent-hover: #357abd;
    --border: #d0d0d0;
    --radius: 8px;
    --shadow: 0 2px 12px rgba(0,0,0,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ===== Header ===== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    height: 48px;
    flex-shrink: 0;
  }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header-actions { display: flex; gap: 6px; }

  .btn {
    padding: 6px 14px; border: none; border-radius: var(--radius);
    font-size: 13px; cursor: pointer; transition: all 0.15s; font-weight: 500;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-outline { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .btn-outline:hover { background: #f0f0f0; }
  .btn-accent-outline { background: white; color: var(--accent); border: 1px solid var(--accent); }
  .btn-accent-outline:hover { background: rgba(74,144,217,0.08); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

  /* ===== Layout ===== */
  .app-layout { display: flex; height: calc(100vh - 48px); }

  /* ===== Sidebar ===== */
  .sidebar {
    width: 250px; background: var(--card); border-right: 1px solid var(--border);
    padding: 12px; overflow-y: auto; flex-shrink: 0;
  }
  .sidebar-section { margin-bottom: 16px; }
  .sidebar-section h3 {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px;
  }

  /* Upload */
  .upload-area {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 20px 12px; text-align: center; cursor: pointer; transition: all 0.2s;
  }
  .upload-area:hover, .upload-area.dragover {
    border-color: var(--accent); background: rgba(74,144,217,0.04);
  }
  .upload-area .icon { font-size: 28px; display: block; margin-bottom: 4px; }
  .upload-area .label { font-size: 13px; color: var(--text-muted); }
  .upload-area .sublabel { font-size: 11px; color: #999; margin-top: 2px; }

  /* Thumbnails */
  .thumb-list {
    display: flex; flex-wrap: wrap; gap: 4px; max-height: 200px;
    overflow-y: auto; padding: 2px;
  }
  .thumb-item {
    width: 48px; height: 48px; border-radius: 4px; overflow: hidden;
    cursor: grab; position: relative; border: 2px solid transparent; transition: border-color 0.15s;
    flex-shrink: 0;
  }
  .thumb-item:hover { border-color: var(--accent); }
  .thumb-item.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .thumb-item.dragging { opacity: 0.3; }
  .thumb-item.drag-over { border-color: var(--accent); border-style: dashed; }
  .thumb-item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
  .thumb-item .remove-btn {
    position: absolute; top: 0; right: 0; width: 16px; height: 16px;
    background: rgba(0,0,0,0.65); color: white; border: none; border-radius: 0 0 0 4px;
    font-size: 10px; cursor: pointer; display: none; align-items: center; justify-content: center;
  }
  .thumb-item:hover .remove-btn { display: flex; }

  /* Controls */
  .control-row {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
  }
  .control-row label { font-size: 12px; color: var(--text); white-space: nowrap; }
  .control-row .value {
    font-size: 11px; color: var(--text-muted); min-width: 32px; text-align: right;
  }
  input[type="range"] { flex: 1; margin: 0 6px; accent-color: var(--accent); height: 4px; }
  input[type="color"] {
    width: 28px; height: 24px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; padding: 1px;
  }
  select {
    width: 100%; padding: 5px 6px; border: 1px solid var(--border); border-radius: 4px;
    font-size: 12px; background: var(--card); color: var(--text);
  }

  .count-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 18px; padding: 0 5px;
    background: var(--accent); color: white; border-radius: 9px;
    font-size: 10px; font-weight: 700; margin-left: 4px;
  }

  .hint { font-size: 11px; color: #999; margin-top: 2px; }

  /* ===== Main Viewport ===== */
  .main-viewport {
    flex: 1; overflow: auto; display: flex; justify-content: center;
    align-items: flex-start; padding: 20px; background: var(--bg);
  }
  .page-wrapper { position: relative; flex-shrink: 0; }
  .page {
    background: white; box-shadow: var(--shadow); position: relative;
    transform-origin: top left; border-radius: 2px;
  }
  .page.drop-over { box-shadow: 0 0 0 3px var(--accent), var(--shadow); }

  /* Image blocks on page */
  .img-block {
    position: absolute; overflow: hidden; cursor: move;
    border: 1.5px solid transparent; border-radius: 2px;
    transition: border-color 0.1s, box-shadow 0.1s;
  }
  .img-block:hover { border-color: rgba(74,144,217,0.3); }
  .img-block.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .img-block img {
    width: 100%; height: 100%; object-fit: cover;
    pointer-events: none; display: block;
  }

  /* Resize handles */
  .resize-handle {
    position: absolute; width: 14px; height: 14px;
    background: var(--accent); border: 2px solid white;
    border-radius: 3px; display: none; z-index: 5;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    /* Invisible hit area expansion */
    margin: -6px;
    padding: 6px;
    box-sizing: content-box;
  }
  .img-block.selected .resize-handle { display: block; }
  .resize-handle.nw { top: -7px; left: -7px; cursor: nw-resize; }
  .resize-handle.ne { top: -7px; right: -7px; cursor: ne-resize; }
  .resize-handle.sw { bottom: -7px; left: -7px; cursor: sw-resize; }
  .resize-handle.se { bottom: -7px; right: -7px; cursor: se-resize; }

  /* Edge resize handles */
  .resize-handle.n  { top: -7px; left: 50%; transform: translateX(-50%); cursor: n-resize; width: 28px; height: 10px; }
  .resize-handle.s  { bottom: -7px; left: 50%; transform: translateX(-50%); cursor: s-resize; width: 28px; height: 10px; }
  .resize-handle.w  { left: -7px; top: 50%; transform: translateY(-50%); cursor: w-resize; width: 10px; height: 28px; }
  .resize-handle.e  { right: -7px; top: 50%; transform: translateY(-50%); cursor: e-resize; width: 10px; height: 28px; }

  /* Size tooltip */
  .size-tip {
    position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.75); color: white; font-size: 10px; padding: 2px 6px;
    border-radius: 3px; white-space: nowrap; pointer-events: none;
    display: none; z-index: 10;
  }
  .img-block.selected .size-tip { display: block; }

  /* Empty state */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--text-muted); text-align: center;
  }
  .empty-state .big-icon { font-size: 56px; margin-bottom: 12px; opacity: 0.25; }
  .empty-state p { font-size: 14px; }
  .empty-state .hint { font-size: 12px; margin-top: 4px; color: #999; }

  /* Drop zone on empty */
  .drop-zone-overlay {
    display: none; position: absolute; inset: 0; z-index: 50;
    background: rgba(74,144,217,0.08); border: 3px dashed var(--accent);
    border-radius: 4px; pointer-events: none;
  }
  .main-viewport.drag-active .drop-zone-overlay { display: block; }

  /* Alignment guides */
  .guide-line {
    position: absolute; background: rgba(74, 144, 217, 0.7);
    z-index: 100; pointer-events: none; display: none;
  }
  .guide-line.horizontal { height: 1px; left: 0; right: 0; }
  .guide-line.vertical { width: 1px; top: 0; bottom: 0; }

  /* Status bar */
  .status-bar {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6); color: white; font-size: 11px;
    padding: 4px 12px; border-radius: 12px; white-space: nowrap;
    pointer-events: none; z-index: 20;
  }

  /* Snap indicator */
  .snap-badge {
    position: absolute; top: -24px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: white; font-size: 9px; padding: 1px 6px;
    border-radius: 3px; white-space: nowrap; pointer-events: none;
    display: none; z-index: 10;
  }
  .snap-badge.visible { display: block; }

  /* Compact fill mode indicator */
  .page.compact-mode {
    outline: 2px dashed rgba(74, 144, 217, 0.4);
    outline-offset: -1px;
  }

  /* Marquee selection box */
  .marquee {
    position: absolute; border: 1.5px dashed var(--accent);
    background: rgba(74, 144, 217, 0.08);
    pointer-events: none; z-index: 200; display: none;
  }

  /* Multi-selected images */
  .img-block.multi-selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
</style>
</head>
<body>

<header class="header">
  <h1>图片拼图打印工具</h1>
  <div class="header-actions">
    <button class="btn btn-primary" id="btnCompact" disabled>紧凑填满</button>
    <button class="btn btn-accent-outline" id="btnRelayout" disabled>重新排列</button>
    <button class="btn btn-outline" id="btnSnap" title="开启/关闭磁力吸附" disabled>🧲 吸附</button>
    <button class="btn btn-outline" id="btnSpaceH" disabled title="水平等间距">⬌ 等间距</button>
    <button class="btn btn-outline" id="btnClear" disabled>清空</button>
    <button class="btn btn-outline" id="btnPrint" disabled>打印</button>
    <button class="btn btn-outline" id="btnExport" disabled>导出 PNG</button>
  </div>
</header>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <h3>上传图片</h3>
      <div class="upload-area" id="uploadArea">
        <span class="icon">📁</span>
        <span class="label">拖拽或点击上传</span>
        <span class="sublabel">支持批量 · JPG PNG WEBP</span>
      </div>
      <input type="file" id="fileInput" multiple accept="image/*" hidden>
    </div>

    <div class="sidebar-section" id="thumbSection" style="display:none">
      <h3>图片列表 <span class="count-badge" id="imgCount">0</span></h3>
      <p class="hint">拖拽缩略图调整顺序</p>
      <div class="thumb-list" id="thumbList"></div>
    </div>

    <div class="sidebar-section">
      <h3>布局</h3>
      <div class="control-row">
        <label>每行张数</label>
      </div>
      <select id="columnsSelect">
        <option value="0">自动</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
      </select>

      <div class="control-row" style="margin-top:8px">
        <label>间距</label>
        <input type="range" id="gapSize" min="0" max="20" value="4" step="1">
        <span class="value" id="gapVal">4mm</span>
      </div>
      <div class="control-row">
        <label>边距</label>
        <input type="range" id="paddingSize" min="0" max="30" value="8" step="1">
        <span class="value" id="padVal">8mm</span>
      </div>
      <div class="control-row">
        <label id="rowHeightLabel">行高</label>
        <input type="range" id="rowHeight" min="15" max="120" value="45" step="1">
        <span class="value" id="rowVal">45mm</span>
      </div>
      <div class="control-row">
        <label>背景</label>
        <input type="color" id="bgColor" value="#ffffff">
      </div>
      <div class="control-row">
        <label>裁切模式</label>
        <select id="fitMode" style="width: auto; min-width: 80px;">
          <option value="cover" selected>裁剪填满 (Cover)</option>
          <option value="contain">完整显示 (Contain)</option>
          <option value="fill">拉伸填满 (Fill)</option>
        </select>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>页面</h3>
      <select id="pageSize">
        <option value="a4">A4 纵向 (210×297mm)</option>
        <option value="a4l">A4 横向 (297×210mm)</option>
        <option value="a3">A3 (297×420mm)</option>
        <option value="letter">Letter (216×279mm)</option>
      </select>
      <div class="control-row" style="margin-top:8px">
        <label>DPI</label>
        <input type="range" id="dpiSize" min="72" max="300" value="150" step="1">
        <span class="value" id="dpiVal">150</span>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>操作提示</h3>
      <p class="hint" style="line-height:1.6">
        · 点击「紧凑填满」自动填满页面<br>
        · 缩放/行高：调大=整体放大<br>
        · 紧凑模式下拖拽角标联动<br>
        · 裁切模式可选 Cover/Contain<br>
        · 拖拽图片移动位置<br>
        · 空白处拖拽框选多张<br>
        · Ctrl+点击 追加选择<br>
        · 默认锁定宽高比<br>
        · 按住 Alt 可自由拉伸<br>
        · Delete 删除选中图片
      </p>
    </div>
  </aside>

  <main class="main-viewport" id="mainViewport">
    <div class="page-wrapper" id="pageWrapper">
      <div class="page" id="page"></div>
      <div class="marquee" id="marquee"></div>
    </div>
    <div class="drop-zone-overlay"></div>
    <div class="empty-state" id="emptyState">
      <span class="big-icon">🖼️</span>
      <p>上传图片开始拼图</p>
      <span class="hint">拖拽图片到页面任意位置</span>
    </div>
  </main>
</div>

<script>
// ============================================================
// Constants & State
// ============================================================
const PAGE_SIZES = {
  a4:    { w: 210, h: 297 },
  a4l:   { w: 297, h: 210 },
  a3:    { w: 297, h: 420 },
  letter:{ w: 215.9, h: 279.4 },
};

const state = {
  images: [],          // { id, img, name, x, y, w, h, zIndex }
  gap: 4,              // mm
  padding: 8,          // mm
  rowHeight: 45,       // mm
  bgColor: '#ffffff',
  pageSize: 'a4',
  dpi: 150,
  columns: 0,          // 0 = auto
  selectedId: null,
  selectedIds: [],    // multi-select array
  zCounter: 1,
  compactFill: false,
  rowAssignments: [], // [{ ids, totalRatio }]
};

let nextId = 0;

// ============================================================
// Snap & Alignment State
// ============================================================
const SNAP_THRESHOLD = 3; // mm — how close to trigger snap
const SIZE_SNAP_THRESHOLD = 2; // mm — how close in size to trigger size snap
let snapEnabled = true;

// Guide line elements (reused)
let guideH1, guideH2, guideV1, guideV2;

function initGuideLines() {
  for (const id of ['gh1','gh2','gv1','gv2']) {
    const el = document.createElement('div');
    el.className = 'guide-line';
    el.id = id;
    if (id.startsWith('g')) el.style.display = 'none';
    page.appendChild(el);
  }
  guideH1 = $('gh1'); guideH2 = $('gh2');
  guideV1 = $('gv1'); guideV2 = $('gv2');
}

function showGuides(hPos, vPos) {
  guideH1.style.display = hPos !== null ? 'block' : 'none';
  if (hPos !== null) { guideH1.style.top = hPos + 'mm'; guideH1.className = 'guide-line horizontal'; }
  guideH2.style.display = 'none';
  guideV1.style.display = vPos !== null ? 'block' : 'none';
  if (vPos !== null) { guideV1.style.left = vPos + 'mm'; guideV1.className = 'guide-line vertical'; }
  guideV2.style.display = 'none';
}

function showDualGuides(hLines, vLines) {
  // hLines: [{ pos, pos2 }] (pos = main guide, pos2 = paired guide)
  guideH1.style.display = hLines.length >= 1 ? 'block' : 'none';
  if (hLines.length >= 1) { guideH1.style.top = hLines[0].pos + 'mm'; }
  guideH2.style.display = hLines.length >= 2 ? 'block' : 'none';
  if (hLines.length >= 2) { guideH2.style.top = hLines[1].pos + 'mm'; }

  guideV1.style.display = vLines.length >= 1 ? 'block' : 'none';
  if (vLines.length >= 1) { guideV1.style.left = vLines[0].pos + 'mm'; }
  guideV2.style.display = vLines.length >= 2 ? 'block' : 'none';
  if (vLines.length >= 2) { guideV2.style.left = vLines[1].pos + 'mm'; }
}

function hideGuides() {
  [guideH1, guideH2, guideV1, guideV2].forEach(g => { if (g) g.style.display = 'none'; });
}

function snapToGuides(img, others) {
  if (!snapEnabled || !others.length) return { dx: 0, dy: 0 };

  const threshold = SNAP_THRESHOLD;
  let bestDx = 0, bestDy = 0;
  let hLines = [], vLines = [];
  let minHDist = threshold, minVDist = threshold;

  const edges = getAlignmentEdges(img, others);

  // Check vertical snap (x-axis)
  for (const e of edges.vEdges) {
    const diff = e.target - e.ref;
    if (Math.abs(diff) < minVDist) {
      minVDist = Math.abs(diff);
      bestDx = diff;
      vLines = [{ pos: e.ref }];
      if (e.paired !== undefined) vLines.push({ pos: e.paired });
    }
  }

  // Check horizontal snap (y-axis)
  for (const e of edges.hEdges) {
    const diff = e.target - e.ref;
    if (Math.abs(diff) < minHDist) {
      minHDist = Math.abs(diff);
      bestDy = diff;
      hLines = [{ pos: e.ref }];
      if (e.paired !== undefined) hLines.push({ pos: e.paired });
    }
  }

  showDualGuides(hLines, vLines);
  return { dx: bestDx, dy: bestDy };
}

function getAlignmentEdges(img, others) {
  const vEdges = []; // { target, ref, paired? }
  const hEdges = [];

  const imgCX = img.x + img.w / 2;
  const imgCY = img.y + img.h / 2;

  for (const o of others) {
    if (o.id === img.id) continue;
    const oCX = o.x + o.w / 2;
    const oCY = o.y + o.h / 2;

    // Left edge
    vEdges.push({ target: img.x, ref: o.x });
    vEdges.push({ target: img.x, ref: o.x + o.w, paired: o.x });
    // Right edge
    vEdges.push({ target: img.x + img.w, ref: o.x + o.w });
    vEdges.push({ target: img.x + img.w, ref: o.x, paired: o.x + o.w });
    // Center X
    vEdges.push({ target: imgCX, ref: oCX });

    // Top edge
    hEdges.push({ target: img.y, ref: o.y });
    hEdges.push({ target: img.y, ref: o.y + o.h, paired: o.y });
    // Bottom edge
    hEdges.push({ target: img.y + img.h, ref: o.y + o.h });
    hEdges.push({ target: img.y + img.h, ref: o.y, paired: o.y + o.h });
    // Center Y
    hEdges.push({ target: imgCY, ref: oCY });
  }

  // Page edges
  const ps = getPageSize();
  vEdges.push({ target: img.x, ref: state.padding });
  vEdges.push({ target: img.x + img.w, ref: ps.w - state.padding });
  vEdges.push({ target: imgCX, ref: ps.w / 2 });
  hEdges.push({ target: img.y, ref: state.padding });
  hEdges.push({ target: img.y + img.h, ref: ps.h - state.padding });
  hEdges.push({ target: imgCY, ref: ps.h / 2 });

  return { vEdges, hEdges };
}

// Snap size to nearby images during resize
function snapSize(img, others, handle, orig) {
  if (!snapEnabled || !others.length) return { w: img.w, h: img.h, snapped: false };

  const threshold = SIZE_SNAP_THRESHOLD;
  let snapped = false;

  for (const o of others) {
    if (o.id === img.id) continue;

    // Snap width
    if (handle.includes('e') || handle.includes('w')) {
      if (Math.abs(img.w - o.w) < threshold) {
        const dw = o.w - img.w;
        if (handle.includes('w')) { img.x += dw; }
        img.w = o.w; snapped = true;
        break;
      }
    }
    // Snap height
    if (handle.includes('n') || handle.includes('s')) {
      if (Math.abs(img.h - o.h) < threshold) {
        const dh = o.h - img.h;
        if (handle.includes('n')) { img.y += dh; }
        img.h = o.h; snapped = true;
        break;
      }
    }
  }

  return { w: img.w, h: img.h, snapped };
}

// ============================================================
// DOM
// ============================================================
const $ = id => document.getElementById(id);

const uploadArea   = $('uploadArea');
const fileInput    = $('fileInput');
const thumbSection = $('thumbSection');
const thumbList    = $('thumbList');
const imgCount     = $('imgCount');
const emptyState   = $('emptyState');
const mainViewport = $('mainViewport');
const pageWrapper  = $('pageWrapper');
const page         = $('page');
const marquee      = $('marquee');

const btnCompact = $('btnCompact');
const btnRelayout = $('btnRelayout');
const btnSnap     = $('btnSnap');
const btnSpaceH   = $('btnSpaceH');
const btnClear    = $('btnClear');
const btnPrint    = $('btnPrint');
const btnExport   = $('btnExport');

const columnsSelect = $('columnsSelect');
const gapSlider     = $('gapSize');
const padSlider     = $('paddingSize');
const rowSlider     = $('rowHeight');
const bgColorPicker = $('bgColor');
const fitModeSelect = $('fitMode');

// ============================================================
// Coordinate Helpers
// ============================================================
function getPageSize() { return PAGE_SIZES[state.pageSize]; }

// Convert mm to display pixels for the page element
function mmToDisplayPx(mm) {
  const rect = page.getBoundingClientRect();
  const ps = getPageSize();
  return mm / ps.w * rect.width;
}

// Convert screen pointer to page mm coordinates
function pointerToMm(e) {
  const rect = page.getBoundingClientRect();
  const ps = getPageSize();
  return {
    x: (e.clientX - rect.left) / rect.width * ps.w,
    y: (e.clientY - rect.top) / rect.height * ps.h,
  };
}

// ============================================================
// Upload
// ============================================================
uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault(); uploadArea.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => { handleFiles(fileInput.files); fileInput.value = ''; });

// Also accept drops on main viewport
mainViewport.addEventListener('dragover', e => { e.preventDefault(); mainViewport.classList.add('drag-active'); });
mainViewport.addEventListener('dragleave', e => { if (!mainViewport.contains(e.relatedTarget)) mainViewport.classList.remove('drag-active'); });
mainViewport.addEventListener('drop', e => {
  e.preventDefault(); mainViewport.classList.remove('drag-active');
  if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
});

function handleFiles(fileList) {
  const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
  if (!files.length) return;
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        state.images.push({ id: nextId++, img, name: file.name, x: 0, y: 0, w: 0, h: 0, zIndex: state.zCounter++ });
        loaded++;
        if (loaded === files.length) {
          compactFill(); // always use compact fill on import
        }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ============================================================
// Auto Layout (smart multi-row)
// ============================================================
function autoLayout() {
  if (!state.images.length) return;
  const ps = getPageSize();
  const pad = state.padding;
  const gap = state.gap;
  const rowH = state.rowHeight;
  const innerW = ps.w - pad * 2;

  const items = state.images.map(m => ({
    id: m.id,
    ratio: m.img.naturalWidth / m.img.naturalHeight,
  }));
  const n = items.length;

  let numRows;
  if (state.columns > 0) {
    numRows = Math.ceil(n / state.columns);
  } else {
    numRows = findOptimalRows(items, innerW, rowH, gap);
  }

  const rows = distributeToRows(items, numRows);
  let y = pad;

  for (const row of rows) {
    const totalRatio = row.reduce((s, it) => s + it.ratio, 0);
    const rowGap = (row.length - 1) * gap;
    const availableW = innerW - rowGap;
    // Scale down row height if total width would exceed
    const actualRowH = Math.min(rowH, availableW / totalRatio);

    let x = pad;
    for (const item of row) {
      const w = item.ratio * actualRowH;
      const imgData = state.images.find(m => m.id === item.id);
      if (imgData) { imgData.x = x; imgData.y = y; imgData.w = w; imgData.h = actualRowH; }
      x += w + gap;
    }
    y += actualRowH + gap;
  }
}

function findOptimalRows(items, innerW, rowH, gap) {
  const n = items.length;
  if (n <= 1) return 1;

  const MIN_IMG_W = 20; // mm - minimum acceptable image width
  let bestRows = 1;
  let bestScore = Infinity;

  for (let r = 1; r <= n; r++) {
    const rows = distributeToRows(items, r);
    let score = 0;
    let anyTooSmall = false;

    for (const row of rows) {
      const totalRatio = row.reduce((s, it) => s + it.ratio, 0);
      const rowGap = (row.length - 1) * gap;
      const neededW = totalRatio * rowH + rowGap;

      if (neededW > innerW) {
        score += (neededW - innerW) * 5;
      } else {
        score += (innerW - neededW) * 0.5;
      }

      for (const item of row) {
        const availW = innerW - rowGap;
        const actualH = Math.min(rowH, availW / totalRatio);
        const itemW = item.ratio * actualH;
        if (itemW < MIN_IMG_W) anyTooSmall = true;
      }
    }

    if (anyTooSmall) score += 500;
    if (score < bestScore) { bestScore = score; bestRows = r; }
  }
  return bestRows;
}

function distributeToRows(items, numRows) {
  const rows = [];
  for (let r = 0; r < numRows; r++) {
    const start = Math.floor(r * items.length / numRows);
    const end = Math.floor((r + 1) * items.length / numRows);
    rows.push(items.slice(start, end));
  }
  return rows;
}

// ============================================================
// Compact Fill Mode — fill page optimally
// ============================================================
function compactFill() {
  if (!state.images.length) return;
  const ps = getPageSize();
  const pad = state.padding;
  const gap = state.gap;
  const innerW = ps.w - pad * 2;
  const innerH = ps.h - pad * 2;

  const items = state.images.map(m => ({
    id: m.id,
    ratio: m._displayRatio || (m.img.naturalWidth / m.img.naturalHeight),
  }));
  const n = items.length;

  let bestConfig = null;
  let bestScore = Infinity;

  const MIN_IMG_W = 30; // minimum image width in mm
  const MAX_ROW_H = 180; // max row height in mm (prevents ultra-tall strips)

  for (let r = 1; r <= n; r++) {
    const rows = distributeToRows(items, r);
    const rowRatios = rows.map(row => row.reduce((s, it) => s + it.ratio, 0));
    const rowGaps = rows.map(row => (row.length - 1) * gap);

    // Ideal row height to fill width
    const rowHs = rowRatios.map((tr, i) => {
      const avail = innerW - rowGaps[i];
      return avail / Math.max(tr, 0.01);
    });

    const totalH = rowHs.reduce((s, h) => s + h, 0) + (r - 1) * gap;
    if (totalH <= 0) continue;

    // Vertically scale to fill page
    const baseVScale = innerH / totalH;
    // User-controlled zoom factor via rowHeight slider (default 45mm = 1.0x)
    const userFactor = Math.max(0.3, state.rowHeight / 45);
    const vScale = baseVScale * userFactor;
    const scaledHs = rowHs.map(h => h * vScale);

    let score = 0;
    let anyTooNarrow = false;

    // Check each image's width in each row
    for (let i = 0; i < rows.length; i++) {
      const row = rows[i];
      const rowH = scaledHs[i];
      const availW = innerW - rowGaps[i];
      for (const item of row) {
        const proportion = item.ratio / Math.max(rowRatios[i], 0.01);
        const itemW = proportion * availW;
        if (itemW < MIN_IMG_W) anyTooNarrow = true;
      }
    }

    if (anyTooNarrow) { score += 2000; } // heavy penalty for narrow images

    // Score: prefer uniform row heights (looks balanced)
    const avg = scaledHs.reduce((s, h) => s + h, 0) / r;
    const variance = scaledHs.reduce((s, h) => s + (h - avg) ** 2, 0);
    score += variance;

    // Penalize if any row is very thin (< 15mm after scaling)
    const minH = Math.min(...scaledHs);
    if (minH < 15) { score += (15 - minH) * 50; }

    // Penalize if any row is too tall (> 180mm — creates weird tall strips)
    const maxH = Math.max(...scaledHs);
    if (maxH > MAX_ROW_H) { score += (maxH - MAX_ROW_H) * 30; }

    if (score < bestScore) {
      bestScore = score;
      bestConfig = { rows, rowRatios, rowGaps, scaledHs };
    }
  }

  if (!bestConfig) return;

  // Apply layout
  state.rowAssignments = [];
  let y = pad;

  for (let i = 0; i < bestConfig.rows.length; i++) {
    const row = bestConfig.rows[i];
    const rowH = bestConfig.scaledHs[i];
    const tr = bestConfig.rowRatios[i];
    const rowGap = bestConfig.rowGaps[i];
    const availableW = innerW - rowGap;

    state.rowAssignments.push({
      ids: row.map(it => it.id),
      totalRatio: tr,
    });

    let x = pad;
    for (const item of row) {
      const proportion = item.ratio / Math.max(tr, 0.01);
      const w = proportion * availableW;
      const imgData = state.images.find(m => m.id === item.id);
      if (imgData) {
        imgData.x = x;
        imgData.y = y;
        imgData.w = w;
        imgData.h = rowH;
        imgData._row = i;
        imgData._displayRatio = item.ratio;
      }
      x += w + gap;
    }

    y += rowH + gap;
  }

  state.compactFill = true;
  updateCompactButton();
  refresh();
}

// ============================================================
// Linked Resize — when one image changes, others follow
// ============================================================
function linkedResize(changedImg) {
  if (!state.compactFill || !state.rowAssignments.length) return;
  if (changedImg._row === undefined || changedImg._row === null) return;

  const ps = getPageSize();
  const pad = state.padding;
  const gap = state.gap;
  const innerW = ps.w - pad * 2;
  const innerH = ps.h - pad * 2;

  const rowIdx = changedImg._row;
  const row = state.rowAssignments[rowIdx];

  // 1. Derive _displayRatio from the ACTUAL dragged width so it doesn't bounce back.
  //    In compact fill: width = (dr / totalRatio) * availableW
  //    We want the changed image to keep its dragged width, so solve for newDr:
  //    newDr = changedW * sumOthers / (availableW - changedW)
  const sumOthers = row.ids
    .filter(id => id !== changedImg.id)
    .reduce((s, id) => {
      const img = state.images.find(m => m.id === id);
      return s + (img ? (img._displayRatio || 1) : 0);
    }, 0);

  const rGap = (row.ids.length - 1) * gap;
  const availableW = innerW - rGap;
  // Clamp so remaining images get at least 15mm each
  const minOthersW = (row.ids.length - 1) * 15;
  const maxChangedW = Math.max(availableW - minOthersW, 15);
  const targetW = Math.min(Math.max(changedImg.w, 10), maxChangedW);

  const newDr = (targetW * sumOthers) / Math.max(availableW - targetW, 1);
  changedImg._displayRatio = Math.max(newDr, 0.05);

  // Recalculate row total
  row.totalRatio = sumOthers + changedImg._displayRatio;

  // 2. Recalculate all row heights (fill width per row, then scale to fill page)
  const allRowHs = state.rowAssignments.map(r => {
    const rg = (r.ids.length - 1) * gap;
    return (innerW - rg) / Math.max(r.totalRatio, 0.01);
  });
  const totalH = allRowHs.reduce((s, h) => s + h, 0) + (state.rowAssignments.length - 1) * gap;
  if (totalH <= 0) return;

  // Apply user zoom factor so the slider setting is respected
  const userFactor = Math.max(0.3, state.rowHeight / 45);
  const vScale = (innerH / totalH) * userFactor;

  // 3. Redistribute ALL images
  let y = pad;
  for (let i = 0; i < state.rowAssignments.length; i++) {
    const r = state.rowAssignments[i];
    const rowH = allRowHs[i] * vScale;
    const rg = (r.ids.length - 1) * gap;
    const availW = innerW - rg;

    let x = pad;
    for (const id of r.ids) {
      const img = state.images.find(m => m.id === id);
      if (img) {
        const dr = img._displayRatio || (img.img.naturalWidth / img.img.naturalHeight);
        const proportion = dr / Math.max(r.totalRatio, 0.01);
        img.w = proportion * availW;
        img.h = rowH;
        img.x = x;
        img.y = y;
        img._row = i;
      }
      x += (state.images.find(m => m.id === id)?.w || 0) + gap;
    }

    y += rowH + gap;
  }
}

function updateCompactButton() {
  if (state.compactFill) {
    btnCompact.textContent = '退出紧凑';
    btnCompact.classList.remove('btn-primary');
    btnCompact.classList.add('btn-accent-outline');
  } else {
    btnCompact.textContent = '紧凑填满';
    btnCompact.classList.remove('btn-accent-outline');
    btnCompact.classList.add('btn-primary');
  }
  updateRowHeightLabel();
}

function updateRowHeightLabel() {
  const label = $('rowHeightLabel');
  if (!label) return;
  if (state.compactFill) {
    label.textContent = '缩放';
    const pct = Math.round(state.rowHeight / 45 * 100);
    rowVal.textContent = pct + '%';
  } else {
    label.textContent = '行高';
    rowVal.textContent = state.rowHeight + 'mm';
  }
}

// ============================================================
// Thumbnail List (sidebar)
// ============================================================
let dragSrcIdx = null;

function renderThumbs() {
  thumbList.innerHTML = '';
  state.images.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'thumb-item' + (state.selectedId === item.id ? ' selected' : '');
    div.draggable = true;
    div.title = item.name;

    const img = document.createElement('img');
    img.src = item.img.src;
    div.appendChild(img);

    const removeBtn = document.createElement('button');
    removeBtn.className = 'remove-btn';
    removeBtn.textContent = '×';
    removeBtn.addEventListener('click', e => {
      e.stopPropagation();
      state.images.splice(idx, 1);
      if (state.selectedId === item.id) state.selectedId = null;
      if (state.images.length && state.compactFill) { compactFill(); } else { refresh(); }
    });
    div.appendChild(removeBtn);

    // Click thumb to select on canvas
    div.addEventListener('click', e => {
      e.stopPropagation();
      state.selectedId = item.id;
      refresh();
    });

    // Drag reorder
    div.addEventListener('dragstart', e => { dragSrcIdx = idx; div.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    div.addEventListener('dragend', () => { div.classList.remove('dragging'); dragSrcIdx = null; thumbList.querySelectorAll('.thumb-item').forEach(el => el.classList.remove('drag-over')); });
    div.addEventListener('dragover', e => { e.preventDefault(); if (dragSrcIdx !== null && dragSrcIdx !== idx) div.classList.add('drag-over'); });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', e => {
      e.preventDefault(); div.classList.remove('drag-over');
      if (dragSrcIdx !== null && dragSrcIdx !== idx) {
        const [moved] = state.images.splice(dragSrcIdx, 1);
        state.images.splice(idx, 0, moved);
        refresh();
      }
    });

    thumbList.appendChild(div);
  });
  imgCount.textContent = state.images.length;
}

// ============================================================
// Page & Image Block Rendering (DOM-based)
// ============================================================
function renderPage() {
  const ps = getPageSize();
  page.style.width = ps.w + 'mm';
  page.style.height = ps.h + 'mm';
  page.style.background = state.bgColor;
  page.classList.toggle('compact-mode', state.compactFill);

  // Clear old blocks
  page.querySelectorAll('.img-block').forEach(el => el.remove());

  // Sort by zIndex for correct layering
  const sorted = [...state.images].sort((a, b) => a.zIndex - b.zIndex);

  for (const item of sorted) {
    const block = createImageBlock(item);
    page.appendChild(block);
  }
}

function createImageBlock(item) {
  const block = document.createElement('div');
  block.className = 'img-block' + (state.selectedId === item.id ? ' selected' : '');
  block.dataset.id = item.id;
  block.style.left = item.x + 'mm';
  block.style.top = item.y + 'mm';
  block.style.width = item.w + 'mm';
  block.style.height = item.h + 'mm';
  block.style.zIndex = item.zIndex;

  const img = document.createElement('img');
  img.src = item.img.src;
  img.draggable = false;
  img.style.objectFit = fitModeSelect ? fitModeSelect.value : 'cover';
  block.appendChild(img);

  // Resize handles (8 directions)
  for (const dir of ['nw','n','ne','w','e','sw','s','se']) {
    const handle = document.createElement('div');
    handle.className = 'resize-handle ' + dir;
    handle.dataset.handle = dir;
    block.appendChild(handle);
  }

  // Size tooltip
  const tip = document.createElement('div');
  tip.className = 'size-tip';
  tip.textContent = `${item.w.toFixed(0)} × ${item.h.toFixed(0)} mm`;
  block.appendChild(tip);

  return block;
}

function updateImageBlock(item) {
  const block = page.querySelector(`.img-block[data-id="${item.id}"]`);
  if (!block) return;
  block.style.left = item.x + 'mm';
  block.style.top = item.y + 'mm';
  block.style.width = item.w + 'mm';
  block.style.height = item.h + 'mm';
  block.style.zIndex = item.zIndex;

  const tip = block.querySelector('.size-tip');
  if (tip) tip.textContent = `${item.w.toFixed(0)} × ${item.h.toFixed(0)} mm`;
}

function updatePageScale() {
  const ps = getPageSize();
  const availW = mainViewport.clientWidth - 40;
  const availH = mainViewport.clientHeight - 40;
  // Approximate mm to px: 1mm ≈ 3.78px at 96 DPI
  const pageWpx = ps.w * 3.78;
  const pageHpx = ps.h * 3.78;
  const scale = Math.min(availW / pageWpx, availH / pageHpx, 1);

  page.style.transform = scale < 1 ? `scale(${scale})` : 'none';
  page.style.transformOrigin = 'top left';

  // Set wrapper to scaled size for proper layout
  pageWrapper.style.width = (ps.w * 3.78 * scale) + 'px';
  pageWrapper.style.height = (ps.h * 3.78 * scale) + 'px';
}

// ============================================================
// Interaction: Drag Move & Resize
// ============================================================
let interaction = null;

page.addEventListener('pointerdown', onPointerDown);
document.addEventListener('pointermove', onPointerMove);
document.addEventListener('pointerup', onPointerUp);

function onPointerDown(e) {
  // Check resize handle first
  const handle = e.target.closest('.resize-handle');
  if (handle) {
    const block = handle.closest('.img-block');
    const id = +block.dataset.id;
    const img = state.images.find(m => m.id === id);
    if (!img) return;
    e.preventDefault();
    e.stopPropagation();
    const pos = pointerToMm(e);
    interaction = {
      type: 'resize', imgId: id, handle: handle.dataset.handle,
      startX: pos.x, startY: pos.y,
      origX: img.x, origY: img.y, origW: img.w, origH: img.h,
      origRatio: img.w / img.h,
    };
    selectImage(id);
    block.style.cursor = handle.style.cursor;
    return;
  }

  // Check image block
  const block = e.target.closest('.img-block');
  if (block) {
    const id = +block.dataset.id;
    const img = state.images.find(m => m.id === id);
    if (!img) return;
    e.preventDefault();
    const pos = pointerToMm(e);

    // Ctrl+click: multi-select toggle
    if (e.ctrlKey || e.metaKey) {
      toggleMultiSelect(id);
      return;
    }

    interaction = {
      type: 'move', imgId: id,
      startX: pos.x, startY: pos.y,
      origX: img.x, origY: img.y,
      origPositions: state.selectedIds.length > 1
        ? state.selectedIds.filter(sid => sid !== id).map(sid => {
            const si = state.images.find(m => m.id === sid);
            return si ? { id: sid, x: si.x, y: si.y } : null;
          }).filter(Boolean)
        : [],
    };
    selectImage(id);
    bringToFront(id);
    block.style.cursor = 'grabbing';
    return;
  }

  // Clicked on page background — start marquee selection (if on page)
  if (e.target === page || page.contains(e.target)) {
    e.preventDefault();
    const pos = pointerToMm(e);
    interaction = {
      type: 'marquee',
      startX: pos.x, startY: pos.y,
      origX: pos.x, origY: pos.y,
    };
    marquee.style.display = 'block';
    marquee.style.left = pos.x + 'mm';
    marquee.style.top = pos.y + 'mm';
    marquee.style.width = '0mm';
    marquee.style.height = '0mm';
    // Don't deselect yet — wait to see if it's a drag or just a click
    return;
  }

  // Clicked outside page
  selectImage(null);
}

function onPointerMove(e) {
  if (!interaction) return;
  e.preventDefault();

  const pos = pointerToMm(e);
  const dx = pos.x - interaction.startX;
  const dy = pos.y - interaction.startY;

    // Marquee selection
  if (interaction.type === 'marquee') {
    const x1 = Math.min(interaction.startX, pos.x);
    const y1 = Math.min(interaction.startY, pos.y);
    const x2 = Math.max(interaction.startX, pos.x);
    const y2 = Math.max(interaction.startY, pos.y);

    marquee.style.left = x1 + 'mm';
    marquee.style.top = y1 + 'mm';
    marquee.style.width = (x2 - x1) + 'mm';
    marquee.style.height = (y2 - y1) + 'mm';
    interaction.endX = pos.x;
    interaction.endY = pos.y;

    // Highlight images that intersect with marquee
    state.images.forEach(img => {
      const block = page.querySelector(`.img-block[data-id="${img.id}"]`);
      if (!block) return;
      const intersects = !(img.x + img.w <= x1 || img.x >= x2 || img.y + img.h <= y1 || img.y >= y2);
      block.classList.toggle('multi-selected', intersects);
    });
    return;
  }

  const img = state.images.find(m => m.id === interaction.imgId);
  if (!img) return;

  const others = state.images.filter(m => m.id !== interaction.imgId);

  if (interaction.type === 'move') {
    img.x = interaction.origX + dx;
    img.y = interaction.origY + dy;

    // Move all multi-selected images together
    if (interaction.origPositions) {
      for (const p of interaction.origPositions) {
        const si = state.images.find(m => m.id === p.id);
        if (si) {
          si.x = p.x + dx;
          si.y = p.y + dy;
          updateImageBlock(si);
        }
      }
    }

    // Snap to alignment guides
    if (snapEnabled) {
      const snap = snapToGuides(img, others);
      img.x += snap.dx;
      img.y += snap.dy;
      // Apply same snap offset to multi-selected
      if (interaction.origPositions && (snap.dx || snap.dy)) {
        for (const p of interaction.origPositions) {
          const si = state.images.find(m => m.id === p.id);
          if (si) {
            si.x += snap.dx;
            si.y += snap.dy;
            updateImageBlock(si);
          }
        }
      }
    }
  } else if (interaction.type === 'resize') {
    const h = interaction.handle;
    const lockRatio = !e.altKey;

    if (lockRatio) {
      resizeLocked(img, h, dx, dy, interaction);
    } else {
      resizeFree(img, h, dx, dy, interaction);
    }

    // Snap size to nearby images
    snapSize(img, others, h, interaction);

    // Compact fill: track display ratio change, linked resize on pointerUp
    if (state.compactFill) {
      const currentW = img.w;
      const scaleFactor = currentW / Math.max(interaction.origW, 1);
      img._displayRatio = interaction.origRatio * Math.max(0.2, Math.min(6, scaleFactor));
    }
  }

  updateImageBlock(img);
}

function resizeLocked(img, handle, dx, dy, orig) {
  const ratio = orig.origRatio;
  const MIN = 5; // mm minimum size

  if (handle === 'se') {
    const dw = dx;
    const newW = Math.max(MIN, orig.origW + dw);
    img.w = newW; img.h = newW / ratio;
  } else if (handle === 'e') {
    const newW = Math.max(MIN, orig.origW + dx);
    img.w = newW; img.h = newW / ratio;
  } else if (handle === 'w') {
    const newW = Math.max(MIN, orig.origW - dx);
    img.x = orig.origX + orig.origW - newW;
    img.w = newW; img.h = newW / ratio;
  } else if (handle === 's') {
    const newH = Math.max(MIN, orig.origH + dy);
    img.h = newH; img.w = newH * ratio;
  } else if (handle === 'n') {
    const newH = Math.max(MIN, orig.origH - dy);
    img.y = orig.origY + orig.origH - newH;
    img.h = newH; img.w = newH * ratio;
  } else if (handle === 'sw') {
    const dw = -dx;
    const newW = Math.max(MIN, orig.origW + dw);
    img.x = orig.origX + orig.origW - newW;
    img.w = newW; img.h = newW / ratio;
  } else if (handle === 'ne') {
    const dw = dx;
    const newW = Math.max(MIN, orig.origW + dw);
    img.w = newW; img.h = newW / ratio;
    img.y = orig.origY + orig.origH - img.h;
  } else if (handle === 'nw') {
    const dw = -dx;
    const newW = Math.max(MIN, orig.origW + dw);
    img.x = orig.origX + orig.origW - newW;
    img.w = newW; img.h = newW / ratio;
    img.y = orig.origY + orig.origH - img.h;
  }
}

function resizeFree(img, handle, dx, dy, orig) {
  const MIN = 5;

  if (handle === 'se') {
    img.w = Math.max(MIN, orig.origW + dx);
    img.h = Math.max(MIN, orig.origH + dy);
  } else if (handle === 'e') {
    img.w = Math.max(MIN, orig.origW + dx);
  } else if (handle === 'w') {
    const newW = Math.max(MIN, orig.origW - dx);
    img.x = orig.origX + orig.origW - newW;
    img.w = newW;
  } else if (handle === 's') {
    img.h = Math.max(MIN, orig.origH + dy);
  } else if (handle === 'n') {
    const newH = Math.max(MIN, orig.origH - dy);
    img.y = orig.origY + orig.origH - newH;
    img.h = newH;
  } else if (handle === 'sw') {
    const newW = Math.max(MIN, orig.origW - dx);
    img.x = orig.origX + orig.origW - newW;
    img.w = newW;
    img.h = Math.max(MIN, orig.origH + dy);
  } else if (handle === 'ne') {
    img.w = Math.max(MIN, orig.origW + dx);
    const newH = Math.max(MIN, orig.origH - dy);
    img.y = orig.origY + orig.origH - newH;
    img.h = newH;
  } else if (handle === 'nw') {
    const newW = Math.max(MIN, orig.origW - dx);
    const newH = Math.max(MIN, orig.origH - dy);
    img.x = orig.origX + orig.origW - newW;
    img.y = orig.origY + orig.origH - newH;
    img.w = newW; img.h = newH;
  }
}

function onPointerUp() {
  if (interaction) {
    // Finalize marquee selection
    if (interaction.type === 'marquee') {
      marquee.style.display = 'none';
      const ex = interaction.endX || interaction.startX;
      const ey = interaction.endY || interaction.startY;
      const x1 = Math.min(interaction.startX, ex);
      const y1 = Math.min(interaction.startY, ey);
      const x2 = Math.max(interaction.startX, ex);
      const y2 = Math.max(interaction.startY, ey);

      // Only count as marquee if dragged a meaningful distance
      if (x2 - x1 > 1 || y2 - y1 > 1) {
        const ids = state.images
          .filter(img => !(img.x + img.w <= x1 || img.x >= x2 || img.y + img.h <= y1 || img.y >= y2))
          .map(img => img.id);

        if (ids.length > 0) {
          state.selectedIds = ids;
          state.selectedId = ids[ids.length - 1];
          // Update visuals
          page.querySelectorAll('.img-block').forEach(b => {
            const bid = +b.dataset.id;
            b.classList.toggle('selected', bid === state.selectedId);
            b.classList.toggle('multi-selected', ids.includes(bid) && bid !== state.selectedId);
          });
          renderThumbs();
        } else {
          selectImage(null);
        }
      } else {
        // Just a click on background — deselect
        selectImage(null);
      }
    } else if (interaction.type === 'resize' && state.compactFill) {
      const img = state.images.find(m => m.id === interaction.imgId);
      if (img && (Math.abs(interaction.origW - img.w) > 0.5 || Math.abs(interaction.origH - img.h) > 0.5)) {
        linkedResize(img);
        state.images.forEach(m => updateImageBlock(m));
      }
    }

    interaction = null;
    page.querySelectorAll('.img-block').forEach(b => b.style.cursor = '');
    hideGuides();
  }
}

// ============================================================
// Selection & Z-order
// ============================================================
function selectImage(id) {
  state.selectedId = id;
  state.selectedIds = id !== null ? [id] : [];
  // Update selection visual on page
  page.querySelectorAll('.img-block').forEach(b => {
    b.classList.toggle('selected', +b.dataset.id === id);
    b.classList.remove('multi-selected');
  });
  renderThumbs();
}

function toggleMultiSelect(id) {
  const idx = state.selectedIds.indexOf(id);
  if (idx >= 0) {
    // Remove from selection
    state.selectedIds.splice(idx, 1);
    if (state.selectedIds.length === 0) {
      selectImage(null);
    } else {
      state.selectedId = state.selectedIds[state.selectedIds.length - 1];
      updateSelectionVisuals();
    }
  } else {
    // Add to selection
    state.selectedIds.push(id);
    state.selectedId = id;
    updateSelectionVisuals();
  }
}

function updateSelectionVisuals() {
  page.querySelectorAll('.img-block').forEach(b => {
    const bid = +b.dataset.id;
    b.classList.toggle('selected', bid === state.selectedId);
    b.classList.toggle('multi-selected', state.selectedIds.includes(bid) && bid !== state.selectedId);
  });
  renderThumbs();
}

function bringToFront(id) {
  const img = state.images.find(m => m.id === id);
  if (img) { img.zIndex = state.zCounter++; updateImageBlock(img); }
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if ((state.selectedId !== null || state.selectedIds.length > 0) && document.activeElement === document.body) {
      e.preventDefault();
      const toDelete = new Set(state.selectedIds.length ? state.selectedIds : [state.selectedId]);
      state.images = state.images.filter(m => !toDelete.has(m.id));
      state.selectedId = null;
      state.selectedIds = [];
      if (state.images.length && state.compactFill) { compactFill(); } else { refresh(); }
    }
  }
  if (e.key === 'Escape') { selectImage(null); }
});

// ============================================================
// Full Refresh
// ============================================================
function refresh() {
  const hasImages = state.images.length > 0;
  emptyState.style.display = hasImages ? 'none' : 'flex';
  pageWrapper.style.display = hasImages ? 'block' : 'none';
  thumbSection.style.display = hasImages ? 'block' : 'none';

  btnCompact.disabled = !hasImages;
  btnRelayout.disabled = !hasImages;
  btnSnap.disabled = !hasImages;
  btnSpaceH.disabled = !hasImages || state.images.length < 2;
  btnClear.disabled = !hasImages;
  btnPrint.disabled = !hasImages;
  btnExport.disabled = !hasImages;
  updateCompactButton();

  renderThumbs();
  renderPage();
  updatePageScale();
}

// ============================================================
// Export
// ============================================================
function exportToCanvas() {
  const ps = getPageSize();
  const pxPerMm = state.dpi / 25.4;
  const canvasW = Math.round(ps.w * pxPerMm);
  const canvasH = Math.round(ps.h * pxPerMm);

  const offscreen = document.createElement('canvas');
  offscreen.width = canvasW;
  offscreen.height = canvasH;
  const octx = offscreen.getContext('2d');

  // Background
  octx.fillStyle = state.bgColor;
  octx.fillRect(0, 0, canvasW, canvasH);

  // Draw images sorted by zIndex
  const sorted = [...state.images].sort((a, b) => a.zIndex - b.zIndex);
  for (const item of sorted) {
    const x = item.x * pxPerMm;
    const y = item.y * pxPerMm;
    const w = item.w * pxPerMm;
    const h = item.h * pxPerMm;

    octx.save();
    octx.beginPath();
    octx.rect(x, y, w, h);
    octx.clip();

    const src = item.img;
    const mode = fitModeSelect ? fitModeSelect.value : 'cover';

    if (mode === 'fill') {
      // Stretch to fill
      octx.drawImage(src, x, y, w, h);
    } else if (mode === 'contain') {
      // Fit entirely inside, letterboxed
      const srcR = src.naturalWidth / src.naturalHeight;
      const dstR = w / h;
      let dw, dh, dx, dy;
      if (srcR > dstR) {
        dw = w; dh = dw / srcR; dx = x; dy = y + (h - dh) / 2;
      } else {
        dh = h; dw = dh * srcR; dx = x + (w - dw) / 2; dy = y;
      }
      octx.drawImage(src, dx, dy, dw, dh);
    } else {
      // Cover fit (default)
      const srcR = src.naturalWidth / src.naturalHeight;
      const dstR = w / h;
      let sx, sy, sw, sh;
      if (srcR > dstR) {
        sh = src.naturalHeight; sw = sh * dstR;
        sx = (src.naturalWidth - sw) / 2; sy = 0;
      } else {
        sw = src.naturalWidth; sh = sw / dstR;
        sx = 0; sy = (src.naturalHeight - sh) / 2;
      }
      octx.drawImage(src, sx, sy, sw, sh, x, y, w, h);
    }
    octx.restore();
  }

  return offscreen;
}

btnExport.addEventListener('click', () => {
  const offscreen = exportToCanvas();
  const link = document.createElement('a');
  link.download = '拼图_' + new Date().toISOString().slice(0, 10) + '.png';
  link.href = offscreen.toDataURL('image/png');
  link.click();
});

btnPrint.addEventListener('click', () => {
  const offscreen = exportToCanvas();
  const dataUrl = offscreen.toDataURL('image/png');
  const win = window.open('', '_blank');
  win.document.write(`
    <html><head><title>拼图打印</title>
    <style>
      body{margin:0;display:flex;justify-content:center;align-items:flex-start;min-height:100vh}
      img{max-width:100%;height:auto}
      @media print{body{margin:0}img{width:100%;height:auto}}
    </style></head>
    <body><img src="${dataUrl}" onload="window.print()"></body></html>
  `);
  win.document.close();
});

// ============================================================
// Smart Actions: Equal Spacing & Snap Toggle
// ============================================================
function equalSpacingHorizontal() {
  if (state.images.length < 2) return;

  // Sort images by left edge X
  const sorted = [...state.images].sort((a, b) => a.x - b.x);

  // Find the bounding box
  const leftMost = Math.min(...sorted.map(i => i.x));
  const rightMost = Math.max(...sorted.map(i => i.x + i.w));
  const totalW = rightMost - leftMost;
  const gap = state.gap;

  const n = sorted.length;
  const totalItemW = sorted.reduce((s, i) => s + i.w, 0);
  const totalGap = totalW - totalItemW;
  const spacing = Math.max(0, totalGap / (n - 1));

  let x = leftMost;
  for (const img of sorted) {
    img.x = x;
    x += img.w + spacing;
  }

  refresh();
}

btnSnap.addEventListener('click', () => {
  snapEnabled = !snapEnabled;
  btnSnap.textContent = snapEnabled ? '🧲 吸附' : '🧲 无吸附';
  btnSnap.classList.toggle('btn-accent-outline', snapEnabled);
  btnSnap.classList.toggle('btn-outline', !snapEnabled);
});

btnSpaceH.addEventListener('click', equalSpacingHorizontal);

// ============================================================
// Control Events
// ============================================================
columnsSelect.addEventListener('change', () => {
  state.columns = +columnsSelect.value;
  if (state.images.length) { autoLayout(); refresh(); }
});

gapSlider.addEventListener('input', () => {
  state.gap = +gapSlider.value; gapVal.textContent = state.gap + 'mm';
  if (state.images.length) {
    if (state.compactFill) { compactFill(); } else { autoLayout(); refresh(); }
  }
});
padSlider.addEventListener('input', () => {
  state.padding = +padSlider.value; padVal.textContent = state.padding + 'mm';
  if (state.images.length) {
    if (state.compactFill) { compactFill(); } else { autoLayout(); refresh(); }
  }
});
rowSlider.addEventListener('input', () => {
  state.rowHeight = +rowSlider.value;
  updateRowHeightLabel();
  if (state.images.length) {
    if (state.compactFill) { compactFill(); }
    else { autoLayout(); refresh(); }
  }
});
bgColorPicker.addEventListener('input', () => {
  state.bgColor = bgColorPicker.value;
  page.style.background = state.bgColor;
});
fitModeSelect.addEventListener('change', () => {
  const mode = fitModeSelect.value;
  page.querySelectorAll('.img-block img').forEach(img => {
    img.style.objectFit = mode;
  });
});
pageSelect.addEventListener('change', () => {
  state.pageSize = pageSelect.value;
  if (state.images.length) {
    if (state.compactFill) { compactFill(); } else { autoLayout(); refresh(); }
  }
  else { updatePageScale(); }
});
dpiSlider.addEventListener('input', () => {
  state.dpi = +dpiSlider.value; dpiVal.textContent = state.dpi;
});

btnCompact.addEventListener('click', () => {
  if (state.compactFill) {
    // Exit compact mode — keep current positions
    state.compactFill = false;
    state.rowAssignments = [];
    updateCompactButton();
  } else {
    compactFill();
  }
});
btnRelayout.addEventListener('click', () => {
  state.compactFill = false;
  state.rowAssignments = [];
  autoLayout();
  refresh();
});
btnClear.addEventListener('click', () => { state.images = []; state.selectedId = null; refresh(); });

// Window resize
window.addEventListener('resize', () => updatePageScale());

// Init
initGuideLines();
btnSnap.textContent = '🧲 吸附';
btnSnap.classList.add('btn-accent-outline');
updatePageScale();
</script>
